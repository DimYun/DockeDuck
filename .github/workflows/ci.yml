name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  unit-tests:
    name: Unit tests (templates + experiments)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        # httpx + pyyaml are needed to import experiments/bench_real.py at collection
        # time; anthropic is imported lazily inside the cloud backends, so it is not
        # required for the no-network unit tests.
        run: pip install pytest pyyaml httpx

      - name: Run tests
        run: pytest tests/ -v

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check templates/ experiments/ tests/

  compose-validate:
    name: Validate 05-ollama docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        working-directory: templates/05-ollama-mcp-coder
        run: |
          cp .env.example .env
          docker compose config -q
          echo "docker-compose.yml is valid"
