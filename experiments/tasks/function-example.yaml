name: find_item
type: function
filename: find_item.py
language: python
description: |
  Linear (sequential) search on a flat or one-level-nested list.
  Function signature: find_item(lst: list, target: any) -> list
  - Scans lst left-to-right. If target is found at index i, return [i, target].
  - If an element of lst is itself a list, scan it left-to-right too.
    If target is found at inner index j, return [[i, j], target].
  - Raises ValueError if target is not found anywhere.

conditions: |
  - If lst is empty -> raise ValueError
  - If lst has one element equal to target -> return [0, target]
  - If lst has one element not equal to target -> raise ValueError
  - If find_item(['a', 10, -5, 'c'], 'a') -> return [0, 'a']
  - If find_item(['w3a', 100, -500, 'c45'], 'c45') -> return [3, 'c45']
  - If target is absent from a multi-element flat list -> raise ValueError
  - If find_item([-5, -3, -1, 0, 2], -3) -> return [1, -3]
  - If all elements equal target -> return [0, target] (first match)
  - If find_item([['a', 'b'], [1, 5, 35], ['ddd', 'wer4', '55']], 5) -> return [[1, 1], 5]

# Canonical acceptance tests (ground truth). ALL benchmark backends are graded against
# these identical tests, so code-generation quality is measured without the noise of a
# small model writing its own (possibly buggy) tests. `pytest` is imported by the runner.
tests: |
  def test_empty_raises():
      with pytest.raises(ValueError):
          find_item([], 'x')

  def test_single_match():
      assert find_item(['a'], 'a') == [0, 'a']

  def test_single_no_match():
      with pytest.raises(ValueError):
          find_item(['a'], 'b')

  def test_flat_first():
      assert find_item(['a', 10, -5, 'c'], 'a') == [0, 'a']

  def test_flat_last():
      assert find_item(['w3a', 100, -500, 'c45'], 'c45') == [3, 'c45']

  def test_absent_raises():
      with pytest.raises(ValueError):
          find_item([1, 2, 3], 99)

  def test_numeric():
      assert find_item([-5, -3, -1, 0, 2], -3) == [1, -3]

  def test_all_equal_first():
      assert find_item(['a', 'a', 'a'], 'a') == [0, 'a']

  def test_nested():
      assert find_item([['a', 'b'], [1, 5, 35], ['ddd', 'wer4', '55']], 5) == [[1, 1], 5]
